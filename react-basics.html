<!DOCTYPE html>
<html>
    <head>
        <title>React Basics</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">

         function ProductDetails({ pname, price, btns, discountPrice, pImg }){
                return(
                    <>
                        <div>
                             <img src={pImg} width="50"/>
                        </div>
                        <p>{pname}</p>
                        {discountPrice ? (
                            <>
                               <p><del>Price: {price}</del></p>
                                <p>Discount price: {discountPrice}</p> 
                            </>
                        ) : (
                            <p>Price: {price}</p>
                        )}
                        <button>{btns}</button>
                    </>
                );
            }

          

            function Ass(){
                return(
                    <>
                       <ProductDetails 
                            pImg="cotton-socks.png"
                            pname="Cotton socks"
                            price="$10.90"
                            discountPrice="$5.45"
                            btns="Add to Cart"
                       /> 
                       <ProductDetails 
                            pImg="tennis-balls.png"
                            pname="Tennis balls"
                            price="$6.00"
                            btns="Add to Cart"
                       /> 
                       <ProductDetails 
                            pImg="plain-t-shirt.png"
                            pname="Plain T-shirts"
                            price="$7.99"
                            discountPrice="$1.15"
                            btns="Add to Cart"
                       /> 
                    </>
                );
            }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<Ass />);
    </script>
    </body>
</html>
