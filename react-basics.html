<!DOCTYPE html>
<html>
    <head>
        <title>React Basics</title>
        <style>
            .on{
                background-color: rgb(25, 135, 84);
                color: white;
                border: none;
                padding: 15px;
                border-radius: 5px;
                font-size: 18px;
            }
            .off{
                background-color: rgb(220, 53, 69);
                color: white;
                border: none;
                padding: 15px;
                border-radius: 5px;
                font-size: 18px;
            }
            .btz{
                background-color: rgb(0, 123, 255);
                padding: 10px 10px;
                border-radius: 5px;
                border: none;
                margin: 10px 10px 0 0;
            }
        </style>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
        <script type="text/babel">

         function ProductDetails({ pname, price, btns, discountPrice, pImg }){
                return(
                    <>
                        <div>
                             <img src={pImg} width="50"/>
                        </div>
                        <p>{pname}</p>
                        {discountPrice ? (
                            <>
                               <p><del>Price: {price}</del></p>
                                <p>Discount price: {discountPrice}</p> 
                            </>
                        ) : (
                            <p>Price: {price}</p>
                        )}
                        <button>{btns}</button>
                    </>
                );
            }

          

            function Ass(){
                return(
                    <>
                       <ProductDetails 
                            pImg="cotton-socks.png"
                            pname="Cotton socks"
                            price="$10.90"
                            discountPrice="$5.45"
                            btns="Add to Cart"
                       /> 
                       <ProductDetails 
                            pImg="tennis-balls.png"
                            pname="Tennis balls"
                            price="$6.00"
                            btns="Add to Cart"
                       /> 
                       <ProductDetails 
                            pImg="plain-t-shirt.png"
                            pname="Plain T-shirts"
                            price="$7.99"
                            discountPrice="$1.15"
                            btns="Add to Cart"
                       /> 
                    </>
                );
            }

            function Example({ count, setCount }) {
                function btnClicked() {
                    setCount(count + 1);
                }
                return (
                    <>
                        <button onClick={btnClicked}>
                            Clicked {count} {count === 1 ? "time" : "times"}
                        </button>
                    </>
                );
            }

            function App(){
                const [count, setCount] = React.useState(0)
                function resetCount() {
                    setCount(0);
                }
               return(
                <>
                    <Example
                        count = {count}
                        setCount = {setCount}
                    />
                    <Example
                        count = {count}
                        setCount = {setCount} 
                    />
                    <button onClick={resetCount}>Reset</button>
                </>
               );
            }

            function Apps(){
                const [inputText, setInputText] = React.useState('');
                function resetInput(){
                    setInputText("")
                }
                function inputExample(){
                    setInputText("Ava")
                }
                return(
                    <>
                        <input 
                            size="30"
                            placeholder="Type a name here"
                            value={inputText}
                            onChange={(e) => {setInputText(e.target.value)}}
                        />
                        <button onClick={resetInput}>Reset</button>
                        <button onClick={inputExample}>Example</button>
                        <p>Hello {inputText}</p>
                    </>
                );
            }

            function LastApp(){
                const [isButtonOn, setIsButtonOn] = React.useState(true);
                function btnChange(){
                    setIsButtonOn(!isButtonOn);
                }
                return(
                    <>
                        <button className={isButtonOn ? 'on' : 'off'} onClick={btnChange}>{isButtonOn ? 'ON' : 'OFF'}</button>
                    </>
                );
            }
            
            function Lastest(){
                const [showPassword, setShowPassword] = React.useState(false);
                function showPword(){
                    setShowPassword(!showPassword)
                }
                return(
                    <>
                        <p>Hello, welcome to my website</p>
                        <div>
                            <input type="email" name="email" id="email" placeholder="Email"/>
                        </div>
                        <input type={showPassword ? "text" : "password"}name="password" id="password" placeholder="Password"/>
                        <button onClick={showPword}>{showPassword ? "hide" : "show"}</button>
                        <div>
                            <button className="btz">Login</button>
                            <button className="btz">Sign up</button>    
                        </div>
                    </>
                );
            }
           function Lastests() {
    const [time, setTime] = React.useState(dayjs().format('hh:mm:ss'));

    React.useEffect(() => {
        const interval = setInterval(() => {
            setTime(dayjs().format('hh:mm:ss'));
            console.log('run code');
        }, 1000);

        return () => clearInterval(interval);
    }, []);

    return (
        <h1>{time}</h1>
    );
}

   function Clicks() {
  const [counter, setCounter] = React.useState(0);

  // save button element
  const buttonRef = React.useRef(null);

  function handleClick() {
    setCounter(prev => prev + 1);
  }

  function reset() {
    setCounter(0);
  }

  function autoClick() {
    setInterval(() => {
      buttonRef.current.click();
    }, 1000);
  }

  return (
    <>
      <button ref={buttonRef} onClick={handleClick}>
        Clicked {counter} times
      </button>

      <button onClick={reset}>
        Reset
      </button>

      <button onClick={autoClick}>
        Auto Click
      </button>
    </>
  );
}



      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<Lastests />);
    </script>
    </body>
</html>
